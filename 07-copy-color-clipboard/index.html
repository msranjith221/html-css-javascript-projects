<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Clipboard</title>
    <link rel="stylesheet" href="style.css">
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" 
    />

</head>
<body>
    <div class="container">
        <div id="h1-plate"><h1>Color Clipboard</h1></div>

        <button id="generate-btn">
            <i class="fas fa-clipboard-user"></i>
            Generate Color
        </button>

        <div class="color-container">
            <!-- Color Square 1  -->
            <div class="color-square">
                <div class="color" style="background-color: #000000"></div>
                <div class="color-value">
                    <span class="hex-value">#000000</span>
                    <span class="fa-stack fa-lg copy-btn">
                        <i class="far fa-square fa-stack-2x"></i>
                        <i class="fas fa-copy fa-stack-1x"></i>
                    </span>
                </div>
            </div>

            <!-- Color Square 2  -->
            <div class="color-square">
                <div class="color" style="background-color: #e27474"></div>
                <div class="color-value">
                    <span class="hex-value">#e27474</span>
                    <span class="fa-stack fa-lg copy-btn">
                        <i class="far fa-square fa-stack-2x"></i>
                        <i class="fas fa-copy fa-stack-1x"></i>
                    </span>
                </div>
            </div>

             <!-- Color Square 3  -->
            <div class="color-square">
                <div class="color" style="background-color: #6fd36f"></div>
                <div class="color-value">
                    <span class="hex-value">#6fd36f</span>
                    <span class="fa-stack fa-lg copy-btn">
                        <i class="far fa-square fa-stack-2x"></i>
                        <i class="fas fa-copy fa-stack-1x"></i>
                    </span>
                </div>
            </div>

             <!-- Color Square 4  -->
            <div class="color-square">
                <div class="color" style="background-color: #3578f7"></div>
                <div class="color-value">
                    <span class="hex-value">#3578f7</span>
                    <span class="fa-stack fa-lg copy-btn">
                        <i class="far fa-square fa-stack-2x"></i>
                        <i class="fas fa-copy fa-stack-1x"></i>
                    </span>
                </div>
            </div>

             <!-- Color Square 5  -->
            <div class="color-square">
                <div class="color" style="background-color: #ffffff"></div>
                <div class="color-value">
                    <span class="hex-value">#ffffff</span>
                    <span class="fa-stack fa-lg copy-btn">
                        <i class="far fa-square fa-stack-2x"></i>
                        <i class="fas fa-copy fa-stack-1x"></i>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
