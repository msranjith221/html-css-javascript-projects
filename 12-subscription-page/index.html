<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Page</title>
    <link rel="stylesheet" href="style.css">
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
        crossorigin="anonymous" 
        referrerpolicy="no-referrer" 
    />
</head>
<body>
    <div class="subscribe-container">
        <div class="icon-container">
            <i class="fas fa-envelope-square"></i>
        </div>
        <h2>Subscribe now</h2>
        <p>Get all the updates sent to your Email</p>

        <form>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" required placeholder="Enter your email" />
            </div>

            <button><i class="fas fa-arrow-right"></i>Subscribe</button>
        </form>

        <div class="benefits">
            <p class="benefit-item"><i class="fas fa-check"></i> get latest Code Updates</p>
            <p class="benefit-item"><i class="fas fa-check"></i> Code Support</p>
            <p class="benefit-item"><i class="fas fa-check"></i> Coding Tips</p>
            <p class="benefit-item"><i class="fas fa-check"></i> spam filter, option to unsubscribe </p>
        </div>
    </div>
</body>
</html>
