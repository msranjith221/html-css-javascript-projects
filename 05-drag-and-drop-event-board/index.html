<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Event Board</h1>

        <div class="board">
            <!-- List-1 -->
            <div class="list">
                <h2>Not started</h2>
                <h3></h3>
                <div class="card" draggable="true" id="card1">clean utensils</div>
                <div class="card" draggable="true" id="card2">get groceries</div>
            </div>

            <!-- List-2 -->
            <div class="list">
                <h2>Started</h2>
                <h3></h3>
                <div class="card" draggable="true" id="card3">wash clothes</div>
                <div class="card" draggable="true" id="card4">cooking</div>
            </div>

            <!-- List-3 -->
            <div class="list">
                <h2>Complete</h2>
                <h3></h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
