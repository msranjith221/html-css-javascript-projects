<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Program</h1>
            <p>Knowledge Questions</p>
            <button id="start-btn">Start</button>
        </div>
        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">1</span> of <span id="total-questions">5</span></p>

                    <p>Result: <span id="score">0</span></p>
                </div>
            </div>
           
            <div id="answers-container" class="answers-container">
                <!-- Answer buttons are added later in javascript code -->
                
            </div>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div class="screen" id="result-screen">
            <h1>Quiz Outcome</h1>
            <div class="result-info">
                <p>Your score <span id="final-score">0</span> out of <span id="max-score">5</span></p>
                <div id="result-message"> Great Work!</div>
            </div>
            <button id="restart-btn">Restart Test</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
